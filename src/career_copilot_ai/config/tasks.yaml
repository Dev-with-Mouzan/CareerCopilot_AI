scrape_jobs_listings_task:
  description: >
    Scrape job listings from the provided job board URLs. For each URL,
    extract job postings that match the user's profile. Focus on collecting:
    job titles, company names, full job descriptions, required skills,
    location/remote status, and application links.

    Use the TopJobsScraperTool to perform semantic matching against the
    user's resume to find the most relevant positions.
  expected_output: >
    A comprehensive list of 10-15 relevant job listings, each containing:
    - job_title: Clear position title
    - company_name: Hiring company name
    - job_description: Full job description text
    - required_skills: List of required technical skills
    - location: Remote/On-site/Hybrid status
    - apply_link: Direct application URL
    - source_url: Original job board URL
  agent: job_hunter
  tools: [TopJobsScraperTool]
  output_file: output/scraped_jobs.json
  create_directory: true

analyze_job_matches_task:
  description: >
    Analyze each scraped job listing against the user's resume using ATS
    evaluation criteria. For each job, calculate:

    1. Overall match percentage (0-100)
    2. Exact keyword matches between resume and job description
    3. Missing critical skills that appear in the job but not resume
    4. ATS compatibility score based on formatting and keyword density
    5. Brief summary explaining the match quality

    Prioritize jobs with match percentage >= 70%.
  expected_output: >
    For each analyzed job, provide:
    - job_title: Position analyzed
    - company_name: Company name
    - match_percentage: Integer 0-100
    - matched_skills: List of skills present in resume
    - missing_skills: List of critical missing skills
    - ats_score: Integer 0-100
    - match_summary: 2-3 sentence explanation of match quality
    - recommendation: "Apply", "Consider", or "Skip"
  agent: ats_analyst
  context:
    - scrape_jobs_listings_task
  output_file: output/ats_analysis_report.json
  guardrail: >
    Each job analysis must include all required fields. Missing skills
    must be specific technical terms from the job description, not generic.

identify_skill_gaps_task:
  description: >
    Aggregate all missing skills from the ATS analysis and identify the
    most critical skill gaps. Prioritize skills based on:

    1. Frequency - how often the skill appears across target jobs
    2. Importance - marked as "required" vs "preferred" in job postings
    3. Market demand - emerging vs. established technologies

    Provide specific, actionable learning recommendations for each gap.
  expected_output: >
    A prioritized skill gap report containing:
    - critical_gaps: Top 5 skills appearing in 50%+ of target jobs
    - secondary_gaps: Skills appearing in 20-50% of jobs
    - learning_recommendations: For each critical gap, provide:
      - skill_name: The specific skill
      - priority_level: "High", "Medium", or "Low"
      - learning_resources: 2-3 specific resources (courses, docs, projects)
      - estimated_time: Realistic learning timeline
      - project_idea: Hands-on project to demonstrate the skill
  agent: ats_analyst
  context:
    - analyze_job_matches_task
  output_file: output/skill_gap_analysis.json

optimize_resume_task:
  description: >
    Using the ATS analysis and skill gap findings, provide comprehensive
    resume optimization recommendations. Focus on:

    1. Keyword optimization - integrate missing high-value keywords naturally
    2. Bullet point rewriting - strengthen impact and quantify achievements
    3. Skills section restructuring - align with target job requirements
    4. Summary/profile optimization - highlight most relevant experience

    Provide specific rewritten content, not just suggestions.
  expected_output: >
    A complete resume optimization package:
    - keyword_recommendations: List of keywords to add with placement suggestions
    - rewritten_sections: Specific sections with before/after comparisons
    - new_bullet_points: 3-5 strengthened bullet points per relevant role
    - skills_section_proposal: Reorganized skills hierarchy
    - summary_rewrite: Optimized professional summary
    - formatting_tips: ATS-friendly formatting recommendations
    - confidence_score: Estimated improvement in ATS score (0-100)
  agent: career_strategist
  context:
    - analyze_job_matches_task
    - identify_skill_gaps_task
  output_file: output/resume_optimization.md
  markdown: true
  guardrail: >
    All rewritten content must maintain truthfulness - do not fabricate
    experience. Suggestions must be specific and actionable.

provide_strategic_guidance_task:
  description: >
    Synthesize all findings into a cohesive career action plan. Address:

    1. Immediate actions - jobs to apply to this week
    2. Short-term goals (1-4 weeks) - skills to learn, applications to submit
    3. Medium-term goals (1-3 months) - projects, certifications, networking
    4. Application strategy - which jobs to prioritize and why

    Include motivational messaging and realistic timelines.
  expected_output: >
    A strategic career action plan containing:
    - executive_summary: 2-paragraph overview of current position
    - target_jobs: Top 5 jobs to apply for with reasoning
    - immediate_actions: Checklist for this week
    - skill_building_plan: 30-60-90 day learning roadmap
    - application_timeline: Suggested application schedule
    - networking_suggestions: Types of connections to make
    - success_metrics: How to measure progress
  agent: career_strategist
  context:
    - scrape_jobs_listings_task
    - analyze_job_matches_task
    - identify_skill_gaps_task
    - optimize_resume_task
  output_file: output/career_action_plan.md
  markdown: true
